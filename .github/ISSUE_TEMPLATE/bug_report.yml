name: Bug Report
description: Report a bug in go-yandex-tracker
labels: ["bug"]
body:
  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`
      placeholder: "go1.25.0 linux/amd64"
    validations:
      required: true
  - type: input
    id: library-version
    attributes:
      label: Library version
      description: Version from go.mod or `go list -m`
      placeholder: "v0.1.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue
      render: go
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
